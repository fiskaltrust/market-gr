name: market-gr tools (Pages build)

on:
  push:
    branches:
      - main
    paths:
      - "src/market-gr-tools/**"
      - ".github/workflows/tools-pages.yml"
      - "global.json"
  pull_request:
    branches:
      - main
    paths:
      - "src/market-gr-tools/**"
      - ".github/workflows/tools-pages.yml"
      - "global.json"
  workflow_dispatch:

# The page is published to https://fiskaltrust.github.io/market-gr/tools/.
# Pages itself is not enabled yet in repo settings — this workflow only
# builds and uploads the artifact so the deploy job can be turned on later
# without further changes.
permissions:
  contents: write   # needed for the auto-release commit on push to main
  pages: write
  id-token: write

concurrency:
  group: tools-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Pages artifact
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Install wasm-tools workload
        run: dotnet workload install wasm-tools

      - name: Publish MyDataConverter.Wasm
        # The .csproj now lives under the mydata-to-fiskaltrust plugin folder.
        # `dotnet publish` of a Microsoft.NET.Sdk.WebAssembly project emits the
        # AppBundle into <output>/wwwroot/_framework, plus a copy of main.js
        # and index.html at <output>/wwwroot/. We pick those up from there.
        run: >
          dotnet publish
          src/market-gr-tools/plugins/mydata-to-fiskaltrust/dotnet/MyDataConverter.Wasm/MyDataConverter.Wasm.csproj
          -c Release -o artifacts/wasm

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: src/market-gr-tools/package-lock.json

      - name: Install npm dependencies
        working-directory: src/market-gr-tools
        run: npm ci

      # Auto-bump per-plugin versions for any plugin whose [Unreleased]
      # section has entries. Commits back with [skip ci] to avoid loops.
      # Only runs on direct pushes to main — PRs and workflow_dispatch
      # builds keep the in-tree versions as-is.
      - name: Auto-release plugins (push to main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: src/market-gr-tools
        run: node scripts/release.mjs --auto-all

      - name: Commit auto-release bumps
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/market-gr-tools/src/tools/*/manifest.ts src/market-gr-tools/src/tools/*/CHANGELOG.md
          if ! git diff --cached --quiet; then
            git commit -m "chore(release): auto-bump plugin versions [skip ci]"
            git push
          else
            echo "No plugin version changes to commit."
          fi

      # --- Remote plugins (built standalone, then staged under public/) ---

      - name: Build qr-to-mydata plugin
        working-directory: src/market-gr-tools/plugins/qr-to-mydata
        run: |
          npm ci
          npm run build

      - name: Stage qr-to-mydata plugin into public/
        working-directory: src/market-gr-tools
        run: node scripts/copy-plugin.mjs qr-to-mydata

      - name: Build vat-lookup plugin
        working-directory: src/market-gr-tools/plugins/vat-lookup
        run: |
          npm ci
          npm run build

      - name: Stage vat-lookup plugin into public/
        working-directory: src/market-gr-tools
        run: node scripts/copy-plugin.mjs vat-lookup

      - name: Build mydata-to-fiskaltrust plugin (React side)
        working-directory: src/market-gr-tools/plugins/mydata-to-fiskaltrust
        run: |
          npm ci
          npm run build

      - name: Stage mydata-to-fiskaltrust plugin into public/
        working-directory: src/market-gr-tools
        run: node scripts/copy-plugin.mjs mydata-to-fiskaltrust

      - name: Stage .NET AppBundle alongside mydata-to-fiskaltrust plugin
        # `dotnet publish` of a Microsoft.NET.Sdk.WebAssembly project lays out
        # `_framework/` (plus dotnet.js, main.js, index.html, ...) under
        # wwwroot/. Copy that whole directory verbatim into the plugin's
        # staged folder so the runtime resolves `./_framework/dotnet.js`
        # relative to `index.js` at runtime.
        run: cp -R artifacts/wasm/wwwroot/. src/market-gr-tools/public/plugins/mydata-to-fiskaltrust/

      - name: Build aade-qr-renderer plugin
        working-directory: src/market-gr-tools/plugins/aade-qr-renderer
        run: |
          npm ci
          npm run build

      - name: Stage aade-qr-renderer plugin into public/
        working-directory: src/market-gr-tools
        run: node scripts/copy-plugin.mjs aade-qr-renderer

      - name: Build receipt-cookbook plugin
        working-directory: src/market-gr-tools/plugins/receipt-cookbook
        run: |
          npm ci
          npm run build

      - name: Stage receipt-cookbook plugin into public/
        working-directory: src/market-gr-tools
        run: node scripts/copy-plugin.mjs receipt-cookbook

      - name: Build aade-errors plugin
        working-directory: src/market-gr-tools/plugins/aade-errors
        run: |
          npm ci
          npm run build

      - name: Stage aade-errors plugin into public/
        working-directory: src/market-gr-tools
        run: node scripts/copy-plugin.mjs aade-errors

      - name: Build React app
        working-directory: src/market-gr-tools
        env:
          NODE_ENV: production
          # The market-gr repo is private, so Pages publishes to an auto-generated
          # *.pages.github.io subdomain at the root path. If the repo is later made
          # public (URL becomes fiskaltrust.github.io/market-gr/), change to
          # VITE_BASE=/market-gr/tools/.
          VITE_BASE: /
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: src/market-gr-tools/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    # Deploy on main, plus a one-off allowance for this PR's branch so the
    # initial rollout is visible before merge. Trigger that one-off via
    # `gh workflow run --ref claude/quirky-jang-26058f` since the PR's
    # checkout ref (refs/pull/N/merge) doesn't satisfy the github-pages
    # environment branch policy. The branch-specific clause is naturally
    # retired once the PR merges and the branch is deleted.
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/claude/quirky-jang-26058f'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
